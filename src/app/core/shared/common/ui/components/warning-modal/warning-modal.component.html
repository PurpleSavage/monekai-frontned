<app-base-modal [title]="title" className="rounded-md border border-white/10 bg-[#0A0A0A]">
  <div class="p-4 space-y-2">
    <div class="px-4 py-1 text-slate-400 text-xs">
      {{ message }}
    </div>
    <div class="flex justify-end gap-4 items-center px-4">
      <button (click)="accept('CLOSE-DO')" class="bg-purple-500 text-black  py-2 px-4 text-sm rounded">{{ textCloseDo }}</button>
      <button (click)="accept('CLOSE-CONTINUE')" class="bg-purple-500 text-black py-2 px-4 text-sm rounded">{{ textCloseContinue }}</button>
    </div>
  </div>
</app-base-modal>
