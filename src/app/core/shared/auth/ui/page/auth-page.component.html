<div class="relative h-screen w-full flex items-center justify-center p-4 selection:bg-purple-500/30 overflow-hidden">

  <!-- Background image -->
  <div 
    class="absolute inset-0 bg-cover bg-center bg-no-repeat"
    style="background-image: url('public-images/background-auth.webp')"
  ></div>

  <!-- Overlay oscuro -->
  <div class="absolute inset-0 bg-[#060608]/40 backdrop-blur-sm"></div>

  <!-- Card -->
  <div class="relative z-10 w-full max-w-md border border-white/5 bg-[#0c0c0e]/90 backdrop-blur-md rounded-2xl p-8 shadow-2xl shadow-black/50 flex flex-col gap-8">
    
    <div class="flex flex-col items-center text-center gap-3">
      <div class="flex items-center gap-2.5">
        <img 
          src="monekai-logo.png" 
          alt="Monekai Logo" 
          class="w-6 h-6 object-cover scale-150 rounded-lg shadow-md shadow-purple-500/10"
        />
        <h2 class="text-white text-xl font-bold tracking-tight">Monekai</h2>
      </div>
      <p class="text-gray-400 text-sm max-w-xs mt-1">
        Sign in with Google to continue in MonekAi
      </p>
    </div>

    <div class="w-full flex justify-center min-h-[44px] items-center">
      @if (!isGoogleSdkLoaded()) {
        <div class="flex items-center gap-3 text-gray-400 text-sm bg-white/5 px-6 py-2.5 rounded-xl border border-white/5 animate-pulse w-[320px] justify-center">
          <svg class="animate-spin h-4 w-4 text-purple-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>Loading secure authentication...</span>
        </div>
      }
      <div 
        id="googleBtnContainer" 
        [class.hidden]="!isGoogleSdkLoaded()"
        class="w-full flex justify-center"
      ></div>
    </div>

  </div>
</div>
