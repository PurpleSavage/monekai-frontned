<div class="flex flex-col gap-4">

  @for(item of skeletons; track $index) {

    <div
      class="animate-pulse flex items-center gap-4 rounded-2xl border border-zinc-800 bg-zinc-900 p-4"
    >

      <div
        class="h-14 w-14 shrink-0 rounded-xl bg-zinc-800"
      ></div>

      <div class="flex-1">
        <div
          class="h-4 w-40 rounded bg-zinc-800"
        ></div>

        <div
          class="mt-2 h-3 w-64 rounded bg-zinc-800"
        ></div>
      </div>

    </div>

  }

</div>
