<section class="w-full min-h-screen bg-[#0c0c0e] px-6 md:px-12 lg:px-20 py-16">
  
  <div class="mb-10 space-y-2">
    <span class="text-xs font-bold uppercase tracking-widest text-purple-400">Discover</span>
    <h2 class="text-2xl md:text-4xl text-white font-bold tracking-tight">Inspired Soundscapes</h2>
  </div>

  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 w-full max-w-7xl mx-auto">
    
    @for (item of soundItems(); track item.id) {
      <div 
        (click)="playSound(item.soundUrl)"
        class="relative aspect-square w-full rounded-xl overflow-hidden bg-[#16161a] border border-white/5 shadow-md group cursor-pointer transition-all duration-300 hover:border-purple-500/30 hover:shadow-purple-500/10"
      >
        <img 
          [src]="item.image" 
          [alt]="item.title"
          class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
          loading="lazy"
        />

        <div class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition-opacity duration-300 backdrop-blur-xs flex flex-col justify-center items-center p-4 text-center">
          
          <p class="text-white font-medium text-sm md:text-base tracking-wide transform translate-y-2 group-hover:translate-y-0 transition-transform duration-300">
            {{ item.title }}
          </p>
          
          <div class="mt-3 p-2 bg-purple-500 rounded-full text-white transform scale-75 opacity-0 group-hover:scale-100 group-hover:opacity-100 transition-all duration-300 delay-75 shadow-lg shadow-purple-500/40">
            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </div>

        </div>
      </div>
    } @empty {
      <div class="col-span-full text-center py-12 text-gray-500 font-mono text-sm">
        No tracks found in the marketplace.
      </div>
    }

  </div>
</section>
